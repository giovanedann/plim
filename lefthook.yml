pre-commit:
  commands:
    lint-fix:
      glob: "*.{ts,tsx,js,jsx,json}"
      run: pnpm biome check --write --staged --no-errors-on-unmatched {staged_files}
      stage_fixed: true
      priority: 1
    typecheck:
      run: pnpm typecheck
      priority: 2
    lint:
      run: pnpm lint
      priority: 3
    test:
      run: pnpm test
      priority: 4

pre-push:
  commands:
    build:
      run: pnpm -r build
      priority: 1
    lint:
      run: pnpm lint
      priority: 2
    test:
      run: pnpm test
      priority: 3
